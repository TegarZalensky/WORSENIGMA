<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Sandi</title>
</head>
<body bgcolor="#FFFFFF" text="#000000">

    <h1>Form Sandi Rahasia</h1>
    <hr>

    <div id="mode-creator">
        <b>Insert Text:</b><br>
        <textarea id="inputMsg" rows="5" style="width: 90%; max-width: 350px;"></textarea><br><br>
        <button onclick="buatLink()">Submit</button>
        <br><br>
        
        <div id="hasil-link" style="display: none;">
            <b>Copy Link Ini:</b><br>
            <textarea id="outputLink" rows="4" style="width: 90%; max-width: 350px;" readonly></textarea>
        </div>
    </div>

    <div id="mode-victim" style="display: none;">
        <b>Pesan Terenkripsi:</b><br>
        <textarea id="layar-sandi" rows="5" style="width: 90%; max-width: 350px;" readonly>MEMUAT...</textarea><br><br>
        
        <button id="btn-decode" onclick="klikDecode()">Decode</button>
        <br><br>
        
        <i><span id="status-teks">Status: Menunggu input pengguna...</span></i>
    </div>

    <script>
        // 20 Rumus Matematika
        const rumus = [
            (x) => (2*x + 5) % 26, (x) => (3*x + 7) % 26, (x) => (5*x + 11) % 26, (x) => (7*x + 2) % 26, (x) => (11*x + 3) % 26,
            (x) => (17*x + 1) % 26, (x) => (19*x + 4) % 26, (x) => (23*x + 5) % 26, (x) => (25*x + 9) % 26, (x) => (x*x + 3) % 26,
            (x) => (x*x + x + 1) % 26, (x) => (2*x*x + 5) % 26, (x) => (3*x*x + 2*x) % 26, (x) => (x*x*x + 2) % 26, (x) => (5*x*x + 7) % 26,
            (x) => (7*x*x + 3*x) % 26, (x) => (11*x*x + 1) % 26, (x) => (13*x + 13) % 26, (x) => (17*x*x + 5) % 26, (x) => (19*x*x + 7*x + 2) % 26
        ];
        
        const simbol = ["@", "#", "$", "_", "&", "-", "+", "(", "/", "£", "¢", "¥", "π", "√", "×", "`", "§", "∆", "~", "%", "^", "*", "=", "{", "}", "|"];
        
        const urlParams = new URLSearchParams(window.location.search);
        const encodedMsg = urlParams.get('m');
        let pesanAsli = "";

        if (encodedMsg) {
            document.getElementById('mode-creator').style.display = 'none';
            document.getElementById('mode-victim').style.display = 'block';
            
            try {
                pesanAsli = decodeURIComponent(atob(encodedMsg));
                jalankanMesinTroll();
            } catch (e) {
                document.getElementById('layar-sandi').value = "Error: Invalid URL.";
                document.getElementById('btn-decode').style.display = 'none';
            }
        }

        function buatLink() {
            let input = document.getElementById('inputMsg').value;
            if (!input) { alert("Teks tidak boleh kosong."); return; }
            
            let base64Msg = btoa(encodeURIComponent(input));
            let linkBaru = window.location.origin + window.location.pathname + "?m=" + base64Msg;
            
            document.getElementById('hasil-link').style.display = 'block';
            document.getElementById('outputLink').value = linkBaru;
        }

        function jalankanMesinTroll() {
            let level = 1;
            let jumlahKlik = 0;
            // Target klik: Level 1=10 klik, Level 2=40 klik, Level 3=90 klik, dst.
            let targetKlik = 10 * Math.pow(level, 2); 
            
            let layar = document.getElementById("layar-sandi");
            let btn = document.getElementById("btn-decode");
            let statusInfo = document.getElementById("status-teks");

            function ubahKeSimbol(teks, indeksRumus) {
                let hasil = "";
                let teksLower = teks.toLowerCase();
                for (let i = 0; i < teksLower.length; i++) {
                    let kode = teksLower.charCodeAt(i);
                    if (kode >= 97 && kode <= 122) {
                        let x = kode - 97;
                        let hasilRumus = Math.abs(rumus[indeksRumus](x));
                        hasil += simbol[hasilRumus % 26];
                    } else {
                        hasil += teksLower[i];
                    }
                }
                return hasil;
            }

            layar.value = ubahKeSimbol(pesanAsli, 0);

            window.klikDecode = function() {
                jumlahKlik++;
                let rumusAcak = Math.floor(Math.random() * 20); 
                layar.value = ubahKeSimbol(pesanAsli, rumusAcak);
                statusInfo.innerText = "Sistem sibuk... (" + jumlahKlik + " klik)";

                if (jumlahKlik >= targetKlik) {
                    layar.value = pesanAsli;
                    btn.disabled = true;
                    statusInfo.innerText = "Berhasil! Teks terbuka selama 2 detik.";

                    setTimeout(() => {
                        level++;
                        targetKlik = 10 * Math.pow(level, 2);
                        jumlahKlik = 0;
                        
                        layar.value = ubahKeSimbol(pesanAsli, Math.floor(Math.random() * 20));
                        btn.disabled = false;
                        statusInfo.innerText = "Koneksi terputus. Target klik meningkat ke level " + level + ".";
                    }, 2000); 
                }
            };
        }
    </script>
</body>
</html>
