<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA ENIGMA SYSTEM</title>
    <style>
        /* CSS FIX: Agar responsif di HP dan tidak keluar layar */
        * { box-sizing: border-box; }
        body { 
            background-color: #050505; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center; 
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }
        .container {
            border: 2px solid #00ff00;
            padding: 15px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background-color: #0a0a0a;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        h2 { color: #ff0000; font-size: 20px; line-height: 1.5; margin: 10px 0; }
        
        /* Navigasi Tab */
        .menu { display: flex; gap: 10px; margin-bottom: 20px; }
        .menu button { flex: 1; padding: 10px; font-size: 14px; background-color: #222; }
        .menu button.active { background-color: #00ff00; color: #000; }

        /* Input dan Teks */
        textarea { 
            width: 100%; 
            height: 100px; 
            background-color: #000; 
            color: #00ff00; 
            border: 1px dashed #00ff00; 
            padding: 10px; 
            font-family: 'Courier New', Courier, monospace;
            margin-bottom: 15px;
            resize: vertical;
        }
        button { 
            width: 100%;
            background-color: #333; 
            color: #fff; 
            border: 2px solid #555; 
            padding: 15px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            font-family: 'Courier New', Courier, monospace;
            margin-bottom: 10px;
        }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #111; color: #444; cursor: not-allowed; border-color: #333; }
        
        /* Area Game */
        #game-area { border-top: 1px solid #333; padding-top: 20px; margin-top: 20px; }
        #layar-sandi { 
            font-size: 22px; 
            letter-spacing: 2px; 
            margin: 20px 0; 
            word-wrap: break-word; 
            min-height: 60px; 
            color: #fff;
        }
        .status-text { font-size: 13px; color: #888; margin-bottom: 15px; }
        .warning { color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>***<br>ULTRA ENIGMA<br>V1.0<br>***</h2>
        <p class="status-text">SECURE TERMINAL CONNECTION</p>
        <hr style="border: 1px dashed #00ff00; margin-bottom: 20px;">

        <div class="menu">
            <button id="btn-tab-enc" class="active" onclick="switchTab('encrypt')">CREATE CODE</button>
            <button id="btn-tab-dec" onclick="switchTab('decrypt')">DECODE SECRETS</button>
        </div>

        <div id="sec-encrypt">
            <p class="status-text">>>> INPUT CLASSIFIED MESSAGE <<<</p>
            <textarea id="inputMsg" placeholder="Type secret message here..."></textarea>
            <button onclick="generateCode()">[ GENERATE ENIGMA CODE ]</button>
            
            <div id="output-area" style="display: none; margin-top: 15px;">
                <p class="status-text">COPY THIS CODE & SEND TO VICTIM:</p>
                <textarea id="outputCode" readonly style="color: #ffeb3b; border-color: #ffeb3b;"></textarea>
            </div>
        </div>

        <div id="sec-decrypt" style="display: none;">
            <div id="input-decrypt-area">
                <p class="status-text">>>> PASTE ENIGMA CODE HERE <<<</p>
                <textarea id="inputCode" placeholder="Paste the code starting with ENIGMA-..."></textarea>
                <button onclick="initSystem()">[ INITIALIZE SYSTEM ]</button>
            </div>

            <div id="game-area" style="display: none;">
                <p class="warning">WARNING: HEAVY ENCRYPTION DETECTED</p>
                <div id="layar-sandi">AWAITING SEQUENCE...</div>
                <button id="btn-clicker" onclick="klikDecode()">[ BREAK SHIELD ]</button>
                <div id="status-victim" class="status-text">System Status: Locked</div>
            </div>
        </div>
    </div>

    <script>
        // === UI LOGIC: SWITCH TABS ===
        function switchTab(tab) {
            document.getElementById('sec-encrypt').style.display = tab === 'encrypt' ? 'block' : 'none';
            document.getElementById('sec-decrypt').style.display = tab === 'decrypt' ? 'block' : 'none';
            
            document.getElementById('btn-tab-enc').className = tab === 'encrypt' ? 'active' : '';
            document.getElementById('btn-tab-dec').className = tab === 'decrypt' ? 'active' : '';
        }

        // === FUNGSI 1: GENERATE CODE ===
        function generateCode() {
            let input = document.getElementById('inputMsg').value;
            if (!input) { alert("Message cannot be empty!"); return; }
            
            // Bungkus dalam base64 dengan prefix agar terlihat keren
            let base64Msg = btoa(encodeURIComponent(input));
            let finalCode = "ENIGMA-" + base64Msg;
            
            document.getElementById('output-area').style.display = 'block';
            document.getElementById('outputCode').value = finalCode;
        }

        // === FUNGSI 2: INITIALIZE GAME DARI KODE ===
        let pesanAsli = "";
        function initSystem() {
            let code = document.getElementById('inputCode').value.trim();
            if (!code.startsWith("ENIGMA-")) {
                alert("Invalid Code Format! Must start with ENIGMA-");
                return;
            }

            try {
                // Ekstrak base64 (hapus "ENIGMA-") lalu decode
                let base64Part = code.substring(7);
                pesanAsli = decodeURIComponent(atob(base64Part));
                
                // Sembunyikan input, munculkan game
                document.getElementById('input-decrypt-area').style.display = 'none';
                document.getElementById('game-area').style.display = 'block';
                mulaiSistemTroll();
            } catch (e) {
                alert("Decryption failed. Code is broken.");
            }
        }

        // === FUNGSI 3: MESIN TROLL (MINI GAME) ===
        function mulaiSistemTroll() {
            const simbol = ["@", "#", "$", "_", "&", "-", "+", "(", "/", "£", "¢", "¥", "π", "√", "×", "`", "§", "∆", "~", "%", "^", "*", "=", "{", "}", "|"];
            const rumus = [
                (x) => (2 * x + 5) % 26, (x) => (3 * x + 7) % 26, (x) => (5 * x + 11) % 26, 
                (x) => (7 * x + 2) % 26, (x) => (Math.pow(x, 2) + 3) % 26
            ];

            let percobaanKe = 1;
            let jumlahKlik = 0;
            // Target awal 10 klik biar gak kelamaan ngetesnya (bisa diganti rumusnya)
            let targetKlik = (10 * Math.pow(percobaanKe, 2)); 
            
            let layar = document.getElementById("layar-sandi");
            let btn = document.getElementById("btn-clicker");
            let status = document.getElementById("status-victim");

            function generateSandi(teks, indeksRumus) {
                let hasil = "";
                let teksLower = teks.toLowerCase();
                for (let i = 0; i < teksLower.length; i++) {
                    let charCode = teksLower.charCodeAt(i);
                    if (charCode >= 97 && charCode <= 122) {
                        let x = charCode - 97;
                        hasil += simbol[Math.abs(rumus[indeksRumus](x))];
                    } else { hasil += teksLower[i]; }
                }
                return hasil;
            }

            layar.innerText = generateSandi(pesanAsli, 0);

            window.klikDecode = function() {
                jumlahKlik++;
                let rumusAcak = Math.floor(Math.random() * rumus.length);
                layar.innerText = generateSandi(pesanAsli, rumusAcak);
                status.innerText = `Brute Force Progress: ${jumlahKlik} clicks (Alg: #${rumusAcak + 1})`;

                if (jumlahKlik >= targetKlik) {
                    // MUNCUL PESAN ASLI
                    layar.innerText = pesanAsli.toUpperCase();
                    layar.style.color = "#00ff00";
                    btn.disabled = true;
                    status.innerText = "FIREWALL BREACHED! VIEWING DATA...";

                    setTimeout(() => {
                        percobaanKe++;
                        targetKlik = (10 * Math.pow(percobaanKe, 2));
                        jumlahKlik = 0;
                        layar.style.color = "#fff";
                        layar.innerText = generateSandi(pesanAsli, Math.floor(Math.random() * rumus.length));
                        btn.disabled = false;
                        status.innerText = `Firewall Restored. Target increased.`;
                    }, 2000);
                }
            };
        }
    </script>
</body>
</html>
