<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Sandi Polosan</title>
    <style>
        /* Desain polosan, background putih, rapi di HP */
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            background: white; 
            color: black; 
            max-width: 500px; 
            margin: auto; 
        }
        textarea { 
            width: 100%; 
            height: 100px; 
            margin-bottom: 10px; 
            box-sizing: border-box;
            padding: 10px;
        }
        button { 
            padding: 10px; 
            width: 100%; 
            cursor: pointer;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        hr { margin: 20px 0; border: 0; border-top: 1px dashed #ccc; }
        .hidden { display: none; }
        
        /* Area Troll Game */
        #game-area { 
            border: 1px solid black; 
            padding: 20px; 
            text-align: center; 
            background: #f9f9f9;
        }
        #layar-sandi { 
            font-size: 18px; 
            word-wrap: break-word; 
            margin-bottom: 15px; 
            font-family: monospace; 
            min-height: 50px;
        }
    </style>
</head>
<body>

    <div id="buat-sandi">
        <h3>1. Buat Sandi</h3>
        <p>Ketik pesan lu di sini:</p>
        <textarea id="inputTeks"></textarea>
        <button onclick="enkripsi()">Ubah Jadi Simbol</button>
        <p>Copy teks aneh ini, kirim ke WA temen lu:</p>
        <textarea id="outputSimbol" readonly></textarea>
    </div>

    <hr>

    <div id="baca-sandi">
        <h3>2. Pecahkan Sandi</h3>
        <p>Paste teks aneh dari chat ke sini:</p>
        <textarea id="inputSimbol"></textarea>
        <button onclick="mulaiTroll()">Mulai Dekripsi</button>
    </div>

    <div id="game-area" class="hidden">
        <p>Sistem Terkunci. Hancurkan perisai untuk membaca pesan.</p>
        <div id="layar-sandi">---</div>
        <button id="btn-klik" onclick="klikDecode()">[ DECODE ]</button>
        <p id="status">Klik: 0</p>
    </div>

    <script>
        // Kamus Simbol Rahasia (A-Z diubah jadi simbol aneh)
        const kamus = {
            'a':'¢', 'b':'£', 'c':'¥', 'd':'π', 'e':'√', 'f':'×', 'g':'§', 'h':'∆', 
            'i':'~', 'j':'|', 'k':'/', 'l':'<', 'm':'>', 'n':'{', 'o':'}', 'p':'[', 
            'q':']', 'r':'¦', 's':'‡', 't':'†', 'u':'µ', 'v':'¶', 'w':'ø', 'x':'¿', 
            'y':'¡', 'z':'∞', ' ': ' '
        };
        
        // Buat kebalikannya (Simbol ke Huruf) untuk mesin dekripsi
        const kebalikanKamus = {};
        for(let huruf in kamus) {
            kebalikanKamus[kamus[huruf]] = huruf;
        }

        // FUNGSI BUAT LU (Ubah teks jadi simbol)
        function enkripsi() {
            let teks = document.getElementById('inputTeks').value.toLowerCase();
            let hasil = '';
            for(let huruf of teks) {
                hasil += kamus[huruf] || huruf; // Kalau gak ada di kamus, biarin aja (kayak tanda baca)
            }
            document.getElementById('outputSimbol').value = hasil;
        }

        // FUNGSI BUAT TEMEN LU (Mulai Game)
        let pesanAsli = '';
        let targetKlik = 15; // Berapa kali dia harus ngeklik
        let jumlahKlik = 0;

        function mulaiTroll() {
            let simbolMasuk = document.getElementById('inputSimbol').value;
            if(!simbolMasuk) return alert("Paste sandinya dulu!");

            pesanAsli = '';
            // Terjemahkan balik ke dalam sistem (belum dikasih liat ke temen lu)
            for(let simbol of simbolMasuk) {
                pesanAsli += kebalikanKamus[simbol] || simbol;
            }

            // Munculkan area game
            document.getElementById('game-area').classList.remove('hidden');
            document.getElementById('baca-sandi').classList.add('hidden'); // Sembunyiin kolom paste
            document.getElementById('buat-sandi').classList.add('hidden'); // Sembunyiin kolom buat
            
            // Tampilkan acakan visual awal (biar kelihatan pusing)
            acakVisual();
        }

        // FUNGSI TROLL CLICKER
        function acakVisual() {
            // Ini cuma buat efek animasi glitch di layar
            let karakterAcak = "ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&*!?";
            let teksGlitch = "";
            for(let i=0; i<pesanAsli.length; i++) {
                if(pesanAsli[i] === ' ') teksGlitch += ' ';
                else teksGlitch += karakterAcak.charAt(Math.floor(Math.random() * karakterAcak.length));
            }
            document.getElementById('layar-sandi').innerText = teksGlitch;
        }

        function klikDecode() {
            jumlahKlik++;
            acakVisual(); // Layar berubah tiap diklik
            document.getElementById('status').innerText = `Klik: ${jumlahKlik} / ${targetKlik}`;

            if(jumlahKlik >= targetKlik) {
                // JEPRET! Muncul pesan asli 2 detik
                document.getElementById('layar-sandi').innerText = pesanAsli.toUpperCase();
                document.getElementById('layar-sandi').style.color = "red";
                document.getElementById('btn-klik').disabled = true;
                document.getElementById('status').innerText = "PESAN TERBUKA 2 DETIK!";

                setTimeout(() => {
                    targetKlik += 15; // Naik level (makin banyak kliknya)
                    jumlahKlik = 0;
                    document.getElementById('layar-sandi').style.color = "black";
                    document.getElementById('btn-klik').disabled = false;
                    document.getElementById('status').innerText = "Terkunci lagi! Target klik naik.";
                    acakVisual();
                }, 2000);
            }
        }
    </script>
</body>
</html>
