<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA ENIGMA (DEV BUILD)</title>
    <style>
        /* CSS PALING POLOS: Menyelesaikan semua masalah layout */
        body { 
            background-color: white; 
            color: black; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            text-align: center;
        }
        .container { 
            width: 100%; 
            max-width: 400px; 
            margin: 0 auto;
        }
        textarea { 
            width: 100%; 
            height: 100px; 
            margin-bottom: 20px; 
            border: 1px solid #ccc; 
            padding: 10px;
        }
        button { 
            display: block; 
            margin: 0 auto 20px; 
            padding: 10px 20px; 
            cursor: pointer;
        }
        #output-link {
            word-wrap: break-word; /* Agar link panjang tidak merusak layout */
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>*** ULTRA ENIGMA ***</h2>
        <p>A bare-bones secret message generator. (This build might be unstable)</p>
        <hr>

        <p>Type your message below:</p>
        <textarea id="inputMsg" placeholder="e.g., 'your plan sucks'"></textarea>
        <button onclick="generateLink()">[ Generate Secret Link ]</button>
        
        <div id="output-area" style="display: none;">
            <p>Generated Secret Link (Copy and Send):</p>
            <textarea id="outputLink" readonly style="color: grey; border-color: grey; height: 60px;"></textarea>
        </div>
    </div>

    <script>
        // === FUNGSI CREATOR: GENERATE LINK ===
        function generateLink() {
            let input = document.getElementById('inputMsg').value;
            if (!input) { alert("Message cannot be empty!"); return; }
            
            // Enkripsi teks ke Base64 (sistem yang sama, UI yang berbeda)
            let base64Msg = btoa(encodeURIComponent(input));
            
            // Buat URL lengkap dengan parameter 'm'
            let secretLink = window.location.origin + window.location.pathname + "?m=" + base64Msg;
            
            // Tampilkan hasil
            document.getElementById('output-area').style.display = 'block';
            document.getElementById('outputLink').value = secretLink;
        }
    </script>
</body>
</html>
